<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Time Journey: 2026 - 2028</title>
  <style>
    :root {
      --bg-color: #000000;
      --border-color: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;

      --day-pending: rgba(51, 65, 85, 0.5);
      --day-pending-alt: rgba(71, 85, 105, 0.6);
      /* Slightly lighter/different for middle 7 days */
      --day-past: #10b981;
      /* Emerald green for past days */
      --day-today: #3b82f6;
      /* Blue for today */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      /* No scrollbars on widget */
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: var(--text-main);
      user-select: none;
    }

    .widget-container {
      background: var(--bg-color);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 20px 24px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
      -webkit-app-region: drag;
      /* allows dragging the borderless window */
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100vw;
      height: 100vh;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .stats {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .stats span {
      color: var(--text-main);
      font-weight: 700;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(21, 10px);
      gap: 4px;
      max-height: calc(55 * 14px - 4px);
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-app-region: no-drag;
      /* buttons should not drag the window */
      width: max-content;
      padding-right: 12px;
    }

    .grid-container::-webkit-scrollbar {
      width: 4px;
    }

    .grid-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .grid-container::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    .day {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: var(--day-pending);
      transition: all 0.3s ease;
      position: relative;
    }

    /* Style the middle 7 columns (8th to 14th) differently */
    .day:nth-child(21n+8),
    .day:nth-child(21n+9),
    .day:nth-child(21n+10),
    .day:nth-child(21n+11),
    .day:nth-child(21n+12),
    .day:nth-child(21n+13),
    .day:nth-child(21n+14) {
      background: var(--day-pending-alt);
    }

    .day.past {
      background: var(--day-past);
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
    }

    .day.today {
      background: var(--day-today);
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.8), 0 0 4px rgba(255, 255, 255, 0.8);
      transform: scale(1.2);
      z-index: 10;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
      }

      70% {
        box-shadow: 0 0 0 6px rgba(59, 130, 246, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
      }
    }

    /* Tooltip styling */
    #global-tooltip {
      position: fixed;
      background: rgba(0, 0, 0, 0.85);
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.15s ease-in-out;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      /* Default translation to help with centering, handled by JS now */
    }

    #global-tooltip.visible {
      opacity: 1;
    }
  </style>
</head>

<body>

  <div class="widget-container">
    <div class="header">
      <div class="title" id="journey-title">Journey: Feb 2026 - Jan 2028</div>
      <div class="stats" id="stats-display">Progress: <span>0</span> / 730 Days</div>
    </div>
    <div class="grid-container" id="grid">
      <!-- Days generated by JS -->
    </div>
  </div>

  <div id="global-tooltip"></div>

  <script src="renderer.js"></script>
</body>

</html>
